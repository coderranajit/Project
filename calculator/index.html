<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="display-box">
            <input type="text" placeholder="0" id="display" disabled>
        </div>
        <div class="buttons">
            <div>
                <button id="all-clear">AC</button>
                <button>9</button>
                <button>6</button>
                <button>3</button>
                <button>Ans</button>
            </div>
            <div>
                <button id="delete">DEL</button>
                <button>8</button>
                <button>5</button>
                <button>2</button>
                <button>0</button>
            </div>
            <div>
                <button id="ops">%</button>
                <button>7</button>
                <button>4</button>
                <button>1</button>
                <button>.</button>
            </div>
            <div>
                <button id="ops">/</button>
                <button id="ops">*</button>
                <button id="ops">+</button>
                <button id="ops">-</button>
                <button id="equal">=</button>
            </div>
        </div>    
    </div>
    <script src="script.js"></script>
</body>
</html>
